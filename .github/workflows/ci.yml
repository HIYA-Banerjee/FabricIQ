name: LoomSense AI CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Train Dummy Model and Seed Test Database
        run: |
          python -m app.ml.training || true

      - name: Run Backend Pytest Suite
        run: |
          pytest backend/tests

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js Bundle
        run: |
          cd frontend
          npm run build
